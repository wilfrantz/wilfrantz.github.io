baseURL = "https://dede.dev"  # Your GitHub Pages URL
title = "DEDE"  # Your title from earlier
theme = "hugo-coder"
languageCode = "en-us"  # Consistent with your previous config
defaultContentLanguage = "en"
enableEmoji = true

[pagination]
  pagerSize = 20

[markup.highlight]
  style = "github-dark"

[params]
  author = "Wilfrantz DEDE"  # Your name
  info = "Systems software engineer."  # Customized for you; adjust as needed
  description = "Wilfrantz DEDE's personal website"  # Your description
  # avatarURL = "images/avatar.png"  # Matches your earlier config
  keywords = "blog, developer, personal"  # Adjusted keywords
  gravatar = "contact@dede.dev"  # Uncomment and add your email if you prefer Gravatar

  faviconSVG = "/img/favicon.svg"  # Optional; add this file to static/img/ if you have it
  favicon_32 = "/favicon-32x32.png"  # Matches your earlier config
  favicon_16 = "/favicon-16x16.png"  # Matches your earlier config

  since = 2020  # Assuming you started recently; adjust to your start year

  enableTwemoji = true

  colorScheme = "dark"  # Matches your earlier forceTheme = "dark"
  hideColorSchemeToggle = false # Hides toggle since you’re forcing dark mode

  # customCSS = ["css/custom.css"]  # Uncomment if you add custom CSS
  # customSCSS = ["scss/custom.scss"]  # Uncomment if you add custom SCSS
  # customJS = ["js/custom.js"]  # Uncomment if you add custom JS

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"
  author = "authors"

# Social links (using your provided links)
